<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Sector Tracker v1.1 | 한국·미국 섹터 등락률 트래커</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23121828'/%3E%3Cpolyline points='3,24 9,18 14,21 20,11 27,6' fill='none' stroke='%234fc3f7' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpolyline points='3,28 9,22 14,25 20,15 27,10' fill='none' stroke='%23ef5350' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' opacity='0.7'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg-dark: #0f172a;
  --card-bg: #1e293b;
  --sidebar-bg: #1e293b;
  --text-main: #f1f5f9;
  --text-muted: #94a3b8;
  --accent-kr: #38bdf8;
  --accent-us: #f87171;
  --border: #334155;
  --up-color: #f87171;
  --down-color: #60a5fa;
  --zero-color: #94a3b8;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  line-height: 1.6;
  display: flex;
  overflow: hidden;
  height: 100vh;
}
#sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1000;
  flex-shrink: 0;
}
#sidebar.collapsed { width: 80px; }
#sidebar.floating { position: fixed; height: 100%; box-shadow: 20px 0 25px -5px rgba(0,0,0,0.3); }
.sidebar-header {
  padding: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.logo-area { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.1rem; white-space: nowrap; }
.logo-icon { width: 32px; height: 32px; background: #334155; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 1rem; }
.nav-group { margin-bottom: 2rem; }
.nav-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; padding-left: 0.75rem; }
.market-toggle { display: flex; background: #0f172a; border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
.m-btn { flex: 1; border: none; background: transparent; color: var(--text-muted); padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
.m-btn.active.kr { background: var(--accent-kr); color: white; }
.m-btn.active.us { background: var(--accent-us); color: white; }
.sector-nav-list { list-style: none; }
.sector-nav-item {
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
  transition: 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.sector-nav-item:hover { background: #334155; color: var(--text-main); }
main { flex: 1; overflow-y: auto; padding: 2rem; position: relative; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.title-group h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
.last-update { font-size: 0.85rem; color: var(--text-muted); }
.controls { display: flex; gap: 10px; }
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-main);
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: 0.2s;
}
.btn:hover { background: #334155; }
.grid-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.index-card { background: var(--card-bg); padding: 1.25rem; border-radius: 16px; border: 1px solid var(--border); }
.idx-name { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.idx-val { font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.chart-container { background: var(--card-bg); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 2rem; min-height: 400px; }
.section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
.grid-sectors { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
.sector-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s; }
.sector-card:hover { transform: translateY(-4px); border-color: #475569; }
.card-head { padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.card-head h3 { font-size: 1rem; font-weight: 700; }
.card-body { padding: 0.75rem; }
.stock-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.stock-table td { padding: 8px 12px; }
.stock-name { font-weight: 500; }
.stock-chg { text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 600; width: 80px; }
.up { color: var(--up-color); }
.down { color: var(--down-color); }
.zero { color: var(--zero-color); }
.perf-section { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); padding: 1.5rem; }
.table-wrapper { overflow-x: auto; }
#perf-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center; }
#perf-table th { padding: 12px; background: #0f172a; position: sticky; top: 0; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border); }
#perf-table td { padding: 10px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
#perf-table tr:hover { background: #334155; }
.memo-icon { cursor: pointer; margin-left: 6px; font-size: 0.8rem; filter: grayscale(1); transition: 0.2s; }
.memo-icon:hover { filter: grayscale(0); transform: scale(1.2); }
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; z-index: 999; }
#overlay.active { display: block; }
@media (max-width: 768px) {
  #sidebar { position: fixed; transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  main { padding: 1rem; }
}
</style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-area">
      <div class="logo-icon">📊</div>
      <span>SectorTracker</span>
    </div>
    <button class="btn" style="padding:4px; border:none;" onclick="toggleSidebarPin()" id="pin-btn">
      <span id="pin-label">고정</span>
    </button>
  </div>
  
  <div class="sidebar-content">
    <div class="market-toggle">
      <button id="btn-kr" class="m-btn active kr" onclick="switchMarket('KR')">KOREA</button>
      <button id="btn-us" class="m-btn us" onclick="switchMarket('US')">U.S.A</button>
    </div>

    <div class="nav-group">
      <div class="nav-label">Quick Navigation</div>
      <ul id="sector-nav" class="sector-nav-list"></ul>
    </div>
  </div>
</aside>

<main>
  <header class="header-top">
    <div class="title-group">
      <h1 id="market-title">Korea Sector Analysis</h1>
      <div class="last-update">Last Updated: <span id="sync-time">-</span></div>
    </div>
    <div class="controls">
      <button class="btn" onclick="refreshData()">
        <span>🔄</span> 새로고침
      </button>
    </div>
  </header>

  <div id="index-grid" class="grid-top"></div>

  <div class="chart-container">
    <div class="section-title">📈 Sector Performance</div>
    <canvas id="mainChart"></canvas>
  </div>

  <div id="sector-grid" class="grid-sectors"></div>

  <div class="perf-section">
    <div class="section-title">🗓️ Historical Performance</div>
    <div class="table-wrapper">
      <table id="perf-table">
        <thead><tr></tr></thead>
        <tbody id="perf-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
let currentMarket = 'KR';
let chartInstance = null;
let pinned = localStorage.getItem('sidebar_pinned') === 'true';
let open   = localStorage.getItem('sidebar_open') !== 'false';

const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const pinBtn  = document.getElementById('pin-btn');
const pinLabel= document.getElementById('pin-label');

function init() {
  applyState(false);
  loadData();
  // 5분마다 자동 새로고침
  setInterval(loadData, 300000);
}

function switchMarket(m) {
  if (currentMarket === m) return;
  currentMarket = m;
  document.getElementById('btn-kr').classList.toggle('active', m === 'KR');
  document.getElementById('btn-us').classList.toggle('active', m === 'US');
  document.getElementById('market-title').textContent = m === 'KR' ? 'Korea Sector Analysis' : 'U.S.A Sector Analysis';
  loadData();
}

function refreshData() {
  const btn = event.currentTarget;
  btn.style.opacity = '0.5';
  btn.disabled = true;
  loadData(() => {
    btn.style.opacity = '1';
    btn.disabled = false;
  });
}

function loadData(cb) {
  google.script.run
    .withSuccessHandler(data => {
      renderDashboard(data);
      if (cb) cb();
    })
    .getDashboardData(currentMarket);
}

function renderDashboard(data) {
  document.getElementById('sync-time').textContent = new Date().toLocaleString();
  renderIndices(data.indices);
  renderCharts(data.sectorPerf);
  renderSectors(data.sectorDetails);
  updateTable(data.stats, data.perfRows, data.sectorNames);
  updateNav(data.sectorNames);
}

function renderIndices(indices) {
  const container = document.getElementById('index-grid');
  container.innerHTML = indices.map(idx => `
    <div class="index-card">
      <div class="idx-name">${idx.name}</div>
      <div class="idx-val ${idx.chg > 0 ? 'up' : (idx.chg < 0 ? 'down' : 'zero')}">
        ${idx.chg > 0 ? '+' : ''}${idx.chg.toFixed(2)}%
      </div>
    </div>
  `).join('');
}

function renderCharts(perf) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  const labels = Object.keys(perf);
  const values = Object.values(perf);
  const colors = values.map(v => v > 0 ? '#f87171' : (v < 0 ? '#60a5fa' : '#94a3b8'));

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
        y: { grid: { display: false }, ticks: { color: '#f1f5f9', font: { weight: 'bold' } } }
      }
    }
  });
}

function renderSectors(details) {
  const grid = document.getElementById('sector-grid');
  grid.innerHTML = details.map(s => `
    <div class="sector-card" id="sector-${s.name}">
      <div class="card-head">
        <h3>${s.name}</h3>
        <span class="${s.avg > 0 ? 'up' : (s.avg < 0 ? 'down' : 'zero')}" style="font-weight:700">
          ${s.avg > 0 ? '+' : ''}${s.avg.toFixed(2)}%
        </span>
      </div>
      <div class="card-body">
        <table class="stock-table">
          ${s.stocks.map(st => `
            <tr>
              <td class="stock-name">
                ${st.name}
                ${st.memo ? `<span class="memo-icon" title="${st.memo}" onclick="alert('${st.memo}')">📝</span>` : ''}
              </td>
              <td class="stock-chg ${st.chg > 0 ? 'up' : (st.chg < 0 ? 'down' : 'zero')}">
                ${st.chg > 0 ? '+' : ''}${st.chg.toFixed(2)}%
              </td>
            </tr>
          `).join('')}
        </table>
      </div>
    </div>
  `).join('');
}

/**
 * 수정된 테이블 업데이트 함수
 * 1) 중복 날짜 방지
 * 2) 장 미개장일(등락률 0) 표시 방지
 */
function updateTable(stats, rows, sectorNames) {
  const tbody = document.getElementById('perf-tbody');
  const theadRow = document.querySelector('#perf-table thead tr');
  
  // 헤더 생성
  theadRow.innerHTML = '<th>날짜</th>';
  sectorNames.forEach(name => {
    const th = document.createElement('th');
    th.textContent = name;
    theadRow.appendChild(th);
  });

  let combined = [];
  
  // 시트의 히스토리 데이터 (최신순 정렬)
  const historicalRows = [...rows].reverse();
  
  // 오늘 실시간 데이터(stats) 검증 로직
  if (stats && stats.date) {
    // 1. 중복 체크를 위한 날짜 포맷 표준화
    const statsDateStr = String(stats.date).trim();
    const lastHistoryDateStr = historicalRows.length > 0 ? String(historicalRows[0][0]).trim() : "";

    // 2. 장 개장 여부 체크 (하나의 섹터라도 등락률이 0이 아니어야 함)
    const hasMarketMovement = stats.sectors && Object.values(stats.sectors).some(v => v !== 0 && v !== null);

    // 3. 조건 검사: 날짜가 중복되지 않고 + 장에 움직임이 있는 경우만 추가
    if (statsDateStr !== lastHistoryDateStr && hasMarketMovement) {
      const statsRow = [stats.date];
      sectorNames.forEach(name => {
        statsRow.push(stats.sectors[name] || 0);
      });
      combined.push(statsRow);
    }
  }
  
  // 히스토리 데이터 합치기
  combined = combined.concat(historicalRows);

  // 테이블 렌더링
  tbody.innerHTML = '';
  combined.forEach(row => {
    const tr = document.createElement('tr');
    row.forEach((cell, idx) => {
      const td = document.createElement('td');
      if (idx === 0) {
        td.textContent = cell;
      } else {
        const val = parseFloat(cell) || 0;
        td.textContent = (val > 0 ? '+' : '') + val.toFixed(2) + '%';
        td.classList.add(val > 0 ? 'up' : (val < 0 ? 'down' : 'zero'));
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function updateNav(names) {
  const nav = document.getElementById('sector-nav');
  nav.innerHTML = names.map(name => `
    <li class="sector-nav-item" onclick="document.getElementById('sector-${name}').scrollIntoView({behavior:'smooth', block:'center'})">
      • ${name}
    </li>
  `).join('');
}

// 사이드바 상태 관리
function applyState(animate) {
  if (!animate) {
    sidebar.style.transition = 'none';
    setTimeout(()=>{ sidebar.style.transition=''; }, 50);
  }
  
  if (pinned) {
    sidebar.classList.remove('floating');
    overlay.classList.remove('active');
    if (open) {
      sidebar.classList.remove('collapsed');
      sidebar.style.width = '';
    } else {
      sidebar.classList.add('collapsed');
    }
  } else {
    sidebar.classList.add('floating');
    sidebar.classList.remove('collapsed');
    sidebar.style.width = 'var(--sidebar-w)';
    if (open) {
      sidebar.style.transform = '';
      sidebar.style.opacity = '1';
      sidebar.style.pointerEvents = '';
      overlay.classList.add('active');
    } else {
      sidebar.style.transform = 'translateX(-100%)';
      sidebar.style.opacity = '0';
      sidebar.style.pointerEvents = 'none';
      overlay.classList.remove('active');
    }
  }
  
  if (pinned && open) {
    pinBtn.classList.add('pinned');
    pinLabel.textContent = '고정됨';
  } else {
    pinBtn.classList.remove('pinned');
    pinLabel.textContent = '고정';
  }
}

window.toggleSidebar = function() {
  open = !open;
  localStorage.setItem('sidebar_open', open);
  applyState(true);
};

window.toggleSidebarPin = function() {
  if (!pinned) {
    pinned = true;
    open   = true;
  } else {
    pinned = false;
    open   = false;
  }
  localStorage.setItem('sidebar_pinned', pinned);
  localStorage.setItem('sidebar_open', open);
  applyState(true);
};

window.onload = init;
</script>
</body>
</html>

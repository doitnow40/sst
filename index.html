<!-- ═══════════════════════════════════════════════════════════════
  PATCH C — loadUs() 함수 내에서 US관심종목도 병렬 로드

  검색: async function loadUs(){
  
  기존 loadUs() 안에 us_watch_* 병렬 호출을 추가합니다.
  아래 전체 함수로 교체하세요:
═══════════════════════════════════════════════════════════════ -->
<script>
async function loadUs(){
  const t0=Date.now();
  // ── 기존 US history + today + 신규 US watch 병렬 로드 ──────────
  const [histData, todayData, watchListData, watchHistData] = await Promise.all([
    api('us_history', 365),
    api('us_today', 0).catch(()=>null),
    api('us_watch_list', 0).catch(()=>null),          // ★ 추가
    api('us_watch_history', 365).catch(()=>null),     // ★ 추가
  ]);
  S.usD      = histData;
  S.usToday  = todayData;
  S.usOk     = true;
  // ★ US관심종목 데이터 저장
  if(watchListData)  { S.usWatchL = watchListData;  }
  if(watchHistData)  { S.usWatchD = watchHistData;  }
  S.usWatchAt = Date.now();
  console.log(`[loadUs] ${Date.now()-t0}ms`);
}

// ── US관심종목 오늘 실시간만 별도 갱신 (10분 자동갱신용) ──────────
async function loadUsWatchToday(){
  try {
    const d = await api('us_watch_today', 0);
    // usToday.sectors 에 US관심종목 섹터도 병합 (없는 키만)
    if(d && d.sectors && S.usToday){
      Object.assign(S.usToday.sectors, d.sectors);
    } else if(d && d.sectors){
      S.usToday = d;
    }
  } catch(e){ console.warn('us_watch_today 로드 실패:', e); }
}
</script>


<!-- ═══════════════════════════════════════════════════════════════
  PATCH D — renderUsList() 함수 교체 (US관심종목 종목 표시 지원)
  
  검색: function renderUsList(sorted){
  
  아래 전체로 교체합니다.
  기존 ETF-only 렌더에서 → 관심종목별 렌더로 변경됩니다.
═══════════════════════════════════════════════════════════════ -->
<script>
function renderUsList(sorted){
  const GC = {INDEX:'#F57F17', SECTOR:'#1565C0', THEMATIC:'#6A1B9A', BOND:'#37474F'};
  const GN = {
    INDEX:    {l:'주요 지수·지표',          i:'📊'},
    SECTOR:   {l:'GICS 11 섹터 (SPDR ETF)', i:'🏢'},
    THEMATIC: {l:'테마 ETF',                i:'🎯'},
    BOND:     {l:'채권 & 달러',             i:'💵'},
  };

  const useToday = (usListMode === 'today');

  // ── 오늘 실시간 섹터 평균 맵 ─────────────────────────────────
  const usTodayMap = S.usToday && S.usToday.sectors ? S.usToday.sectors : {};

  // ── 최근 영업일 섹터 평균 맵 (히스토리 1행) ───────────────────
  const usLastBiz = {};
  if(S.usWatchD && S.usWatchD.rows && S.usWatchD.rows.length > 0){
    const H = S.usWatchD.headers;
    const latest = S.usWatchD.rows[0];
    H.slice(1).forEach((name,ci) => {
      const v = parseFloat(latest[ci+1]);
      if(!isNaN(v)) usLastBiz[name] = v;
    });
  } else if(S.usD && S.usD.rows && S.usD.rows.length > 0){
    // fallback: 기존 US history (ETF 기반)
    const H = S.usD.headers;
    const latest = S.usD.rows[0];
    H.slice(1).forEach((name,ci) => {
      const v = parseFloat(latest[ci+1]);
      if(!isNaN(v)) usLastBiz[name] = v;
    });
  }
  const dataMap = useToday ? usTodayMap : usLastBiz;

  // ── US관심종목 데이터 유무 확인 ───────────────────────────────
  const hasWatchList = S.usWatchL && S.usWatchL.sectors && S.usWatchL.sectors.length > 0;

  // ── 그룹별 섹터 구성 ─────────────────────────────────────────
  const groups = {};
  const sectorGroupMap = {}; // 섹터명 → group

  if(hasWatchList){
    // ★ US관심종목 기반 렌더링 (종목 표시 가능)
    S.usWatchL.sectors.forEach(sec => {
      const meta = US_META[sec.sector] || {};
      const g    = meta.group || 'THEMATIC';
      sectorGroupMap[sec.sector] = g;
      if(!groups[g]) groups[g] = [];
      groups[g].push({ name: sec.sector, stocks: sec.stocks, meta: meta });
    });
  } else {
    // fallback: 기존 US_META 기반 (관심종목 없을 때)
    Object.entries(US_META).forEach(([n,m]) => {
      const g = m.group || 'INDEX';
      if(!groups[g]) groups[g] = [];
      groups[g].push({ name: n, stocks: [], meta: m });
    });
  }

  // ── 정렬 ────────────────────────────────────────────────────
  if(sorted){
    Object.keys(groups).forEach(g => {
      groups[g].sort((a,b) => a.name.localeCompare(b.name, 'ko'));
    });
  } else if(typeof rateSort !== 'undefined' && rateSort !== 0){
    Object.keys(groups).forEach(g => {
      groups[g].sort((a,b) => {
        const va = dataMap[a.name], vb = dataMap[b.name];
        if(va === undefined && vb === undefined) return 0;
        if(va === undefined) return 1;
        if(vb === undefined) return -1;
        return rateSort === 1 ? (vb - va) : (va - vb);
      });
    });
  }

  // ── HTML 생성 ────────────────────────────────────────────────
  let h = '<div class="sector-grid">';
  ['INDEX','SECTOR','THEMATIC','BOND'].forEach(g => {
    if(!groups[g] || groups[g].length === 0) return;
    const info = GN[g] || {l:g, i:'📌'};

    h += `<div class="sector-card">
      <div class="sector-card-header" style="background:${GC[g]}22;border-bottom-color:${GC[g]}55">
        <div class="sector-card-title" style="background:${GC[g]};color:${GN[g]?.l.includes('주요')?'#000':'#fff'}">${info.i} ${info.l}</div>
        <div class="sector-card-meta">
          <span class="sector-count" style="font-size:10px;color:var(--text-muted)">${groups[g].length}개 섹터</span>
        </div>
      </div>
      <div class="sector-stocks">`;

    groups[g].forEach(({ name, stocks, meta }) => {
      const chg  = dataMap[name];
      const m    = meta || {};
      let chgHtml = '';
      if(chg !== undefined && !isNaN(chg)){
        const col  = chg > 0 ? '#ef5350' : chg < 0 ? '#42a5f5' : '#8a9ab5';
        const sign = chg > 0 ? '+' : '';
        const bold = Math.abs(chg) >= 3 ? 'bold' : 'normal';
        chgHtml = `<span style="font-family:var(--font-mono);font-size:10px;color:${col};font-weight:${bold};flex-shrink:0">${sign}${chg.toFixed(2)}%</span>`;
      }

      // 섹터 헤더 행
      h += `<div class="stock-item" style="border-bottom:1px solid rgba(255,255,255,.06);padding:5px 8px;cursor:pointer"
              onclick="openSectorPopup('${name.replace(/'/g,"\\'")}',false)">
        <span style="display:flex;align-items:center;gap:6px;flex:1">
          <span style="width:9px;height:9px;background:${m.bg||'#607d8b'};border-radius:2px;flex-shrink:0;display:inline-block"></span>
          <strong style="font-size:12px;color:var(--text-primary)">${name}</strong>
          ${m.etf ? `<span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);background:rgba(0,0,0,.2);padding:1px 5px;border-radius:3px">${m.etf}</span>` : ''}
          ${m.en && m.en !== name ? `<span style="font-size:9px;color:var(--text-muted)">${m.en}</span>` : ''}
        </span>
        ${chgHtml}
      </div>`;

      // 관심종목 행 (ETF 제외 개별 종목만 표시)
      if(hasWatchList && stocks && stocks.length > 1){
        // 첫 번째(ETF 대표)는 이미 섹터 헤더에 etf로 표시 → index 1부터
        stocks.slice(1).forEach(stock => {
          if(!stock.name) return;
          const sv   = stock.chg;
          let sChgHtml = '';
          if(sv !== null && sv !== undefined && !isNaN(sv)){
            const sc  = sv > 0 ? '#ef5350' : sv < 0 ? '#42a5f5' : '#8a9ab5';
            const ss  = sv > 0 ? '+' : '';
            sChgHtml  = `<span style="font-family:var(--font-mono);font-size:9px;color:${sc}">${ss}${sv.toFixed(2)}%</span>`;
          }
          const mcap = stock.marketCap !== null && stock.marketCap !== undefined
            ? `<span style="font-size:8px;color:var(--text-muted);margin-left:4px">$${stock.marketCap.toFixed(1)}B</span>` : '';
          h += `<div class="stock-item" style="padding:3px 8px 3px 22px;opacity:.85">
            <span style="font-size:11px;color:var(--text-secondary);flex:1">
              ${stock.name}
              ${stock.ticker ? `<span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-left:4px">${stock.ticker.split(':').pop()}</span>` : ''}
              ${mcap}
            </span>
            ${sChgHtml}
          </div>`;
        });
      }
    });

    h += `</div></div>`;
  });
  h += '</div>';
  document.getElementById('us-list').innerHTML = h;
}
</script>

<!-- 관리자 탭 전환 함수에 'us-mgmt' 케이스 추가 (switchAdminTab 안에) -->
<script>
// ── US관리 탭 렌더링 ─────────────────────────────────────────────
let _usAdminSelSector = null;

function usAdminRenderSectorList(){
  const el = document.getElementById('us-admin-sector-list-body');
  if(!el) return;
  if(!S.usWatchL || !S.usWatchL.sectors){ el.innerHTML = '<div style="padding:14px;font-size:11px;color:var(--text-muted)">데이터 없음 — US관심종목 초기 세팅 필요</div>'; return; }
  let h = '';
  S.usWatchL.sectors.forEach(sec => {
    const sel = _usAdminSelSector === sec.sector;
    h += `<div class="admin-sector-item${sel?' selected':''}" onclick="usAdminSelectSector('${sec.sector.replace(/'/g,"\\'")}')">
      <span>${sec.sector}</span>
      <span style="font-size:9px;color:var(--text-muted)">${sec.stocks.length}개</span>
      <button class="admin-del-btn" onclick="event.stopPropagation();usAdminDelSector('${sec.sector.replace(/'/g,"\\'")}')">삭제</button>
    </div>`;
  });
  el.innerHTML = h;
}

function usAdminSelectSector(sector){
  _usAdminSelSector = sector;
  usAdminRenderSectorList();
  usAdminRenderStockPanel(sector);
}

function usAdminRenderStockPanel(sector){
  const title = document.getElementById('us-admin-panel-title');
  const body  = document.getElementById('us-admin-panel-body');
  if(!title || !body) return;
  title.textContent = `🇺🇸 ${sector} 종목 관리`;
  if(!S.usWatchL) return;
  const sec = S.usWatchL.sectors.find(s => s.sector === sector);
  if(!sec){ body.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:20px">섹터 없음</div>'; return; }
  let h = '';
  sec.stocks.forEach((st, idx) => {
    const isEtf = idx === 0; // 첫 종목 = 대표 ETF
    h += `<div class="admin-stock-item">
      <span class="admin-stock-name">${isEtf ? '⭐ ' : ''}${st.name}</span>
      ${st.ticker ? `<span class="admin-stock-ticker">${st.ticker.split(':').pop()}</span>` : ''}
      ${st.chg !== null && st.chg !== undefined ? `<span style="font-size:10px;color:${st.chg>0?'#ef5350':'#42a5f5'};font-family:var(--font-mono)">${st.chg>0?'+':''}${st.chg.toFixed(2)}%</span>` : ''}
      ${isEtf ? '<span style="font-size:9px;color:var(--text-muted);margin-left:auto">대표ETF</span>' : `<button class="admin-del-btn" onclick="usAdminDelStock('${sector.replace(/'/g,"\\'")}','${st.name.replace(/'/g,"\\'")}')">삭제</button>`}
    </div>`;
  });
  // 종목 추가 폼
  h += `<div class="admin-input-row" style="margin-top:12px">
    <input class="admin-input" id="us-add-stock-name" placeholder="종목명 (예: NVIDIA)" style="flex:2">
    <input class="admin-input" id="us-add-stock-ticker" placeholder="티커 (예: NASDAQ:NVDA)" style="flex:2">
    <button class="admin-add-btn" onclick="usAdminDoAddStock()">+ 추가</button>
  </div>
  <div style="font-size:10px;color:var(--text-muted);margin-top:6px">
    💡 티커 형식: NASDAQ:NVDA / NYSE:AAPL / NYSEARCA:XLK (거래소:심볼)
  </div>`;
  body.innerHTML = h;
}

async function usAdminAddSectorPrompt(){
  const name = prompt('추가할 US 섹터명을 입력하세요 (한국어 가능)');
  if(!name || !name.trim()) return;
  const msg = document.getElementById('us-admin-msg');
  msg.className='admin-msg'; msg.style.display='none';
  try {
    const r = await adminApi('us_add_sector', {sector: name.trim()});
    if(!r.ok) throw new Error(r.error||'실패');
    showUsAdminMsg('ok', `"${name}" 섹터가 추가되었습니다.`);
    await refreshUsWatchList();
  } catch(e) { showUsAdminMsg('err', e.message); }
}

async function usAdminDelSector(sector){
  if(!confirm(`"${sector}" 섹터와 전체 종목을 삭제하시겠습니까?`)) return;
  try {
    const r = await adminApi('us_delete_sector', {sector});
    if(!r.ok) throw new Error(r.error||'실패');
    if(_usAdminSelSector === sector) _usAdminSelSector = null;
    showUsAdminMsg('ok', `"${sector}" 섹터가 삭제되었습니다.`);
    await refreshUsWatchList();
  } catch(e) { showUsAdminMsg('err', e.message); }
}

async function usAdminDelStock(sector, stockName){
  if(!confirm(`"${stockName}" 종목을 삭제하시겠습니까?`)) return;
  try {
    const r = await adminApi('us_delete_stock', {sector, stock_name: stockName});
    if(!r.ok) throw new Error(r.error||'실패');
    showUsAdminMsg('ok', `"${stockName}" 삭제 완료`);
    await refreshUsWatchList();
  } catch(e) { showUsAdminMsg('err', e.message); }
}

async function usAdminDoAddStock(){
  const name   = document.getElementById('us-add-stock-name')?.value.trim();
  const ticker = document.getElementById('us-add-stock-ticker')?.value.trim();
  if(!name){ showUsAdminMsg('err', '종목명을 입력하세요'); return; }
  if(!_usAdminSelSector){ showUsAdminMsg('err', '섹터를 선택하세요'); return; }
  try {
    const r = await adminApi('us_add_stock', {sector: _usAdminSelSector, stock_name: name, ticker: ticker||''});
    if(!r.ok) throw new Error(r.error||'실패');
    showUsAdminMsg('ok', `"${name}" 추가 완료`);
    await refreshUsWatchList();
  } catch(e) { showUsAdminMsg('err', e.message); }
}

function showUsAdminMsg(type, txt){
  const el = document.getElementById('us-admin-msg');
  if(!el) return;
  el.className = `admin-msg ${type}`;
  el.textContent = txt;
  el.style.display = 'block';
  setTimeout(() => { el.style.display='none'; }, 4000);
}

async function refreshUsWatchList(){
  try {
    const d = await api('us_watch_list', 0, true);
    S.usWatchL = d;
    usAdminRenderSectorList();
    if(_usAdminSelSector) usAdminRenderStockPanel(_usAdminSelSector);
  } catch(e) { console.error('US 관심종목 새로고침 실패:', e); }
}

// adminApi 헬퍼 — 기존 ADMIN_CONFIG.PW_HASH 사용
async function adminApi(action, params){
  const pw_hash = window.ADMIN_PW_HASH || (window.ADMIN_CONFIG && ADMIN_CONFIG.PW_HASH) || '';
  const qs = new URLSearchParams({type:'admin', action, pw_hash, ...params}).toString();
  const res = await fetch(GAS_WEBAPP_URL + '?' + qs);
  return await res.json();
}

// switchAdminTab 에 'us-mgmt' 케이스 추가
// 기존 switchAdminTab 함수 찾아서 아래 케이스 추가:
// case 'us-mgmt':
//   usAdminRenderSectorList();
//   break;

// ★ 기존 switchAdminTab 함수 전체 교체 (us-mgmt 추가):
function switchAdminTab(tab, el){
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  if(el) el.classList.add('active');
  const ids = ['stats','mgmt','watch','techref','us-mgmt'];
  ids.forEach(id => {
    const div = document.getElementById('admin-tab-'+id);
    if(div) div.style.display = (id === tab) ? '' : 'none';
  });
  if(tab === 'us-mgmt'){
    if(!S.usWatchL) {
      api('us_watch_list',0).then(d => { S.usWatchL=d; usAdminRenderSectorList(); });
    } else {
      usAdminRenderSectorList();
    }
  }
}
</script>
